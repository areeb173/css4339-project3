name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app dependencies
        run: npm install

      - name: Install test dependencies
        run: npm install
        working-directory: test

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}

      - name: Seed CI database
        run: node loadDatabase.js
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Start API server
        run: node webServer.js &
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          CLIENT_ORIGIN: http://localhost:3000

      - name: Wait for API server
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001/admin/me >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Test
        run: npm test

      - name: Trigger Vercel deployment
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          fi
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}

      - name: Trigger Render deployment
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
